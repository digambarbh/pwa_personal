  <!-- Text uses the gradient -->
  <text x="256" y="276" font-family="'Brush Script MT', 'Grand Hotel', 'Pacifico', cursive, sans-serif" font-size="100" font-weight="normal" fill="url(#insta)" text-anchor="middle" dominant-baseline="middle">Prep Insta</text>
</svg>
