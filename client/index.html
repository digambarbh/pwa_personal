<!doctype html>
<html lang="en">

<head>
  <meta name="theme-color" content="#bc1888" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Prep Insta" />
  <link rel="icon" type="image/jpeg" href="/logo.jpeg" />
  <link rel="apple-touch-icon" href="/logo.jpeg" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Prep Insta</title>
  <style>
    body {
      margin: 0;
      background-color: #000;
    }
    #splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out, visibility 0.5s ease-out;
    }
    #splash h1 {
      font-family: 'Brush Script MT', 'Grand Hotel', 'Pacifico', cursive, sans-serif;
      color: white;
      font-size: 4.5rem;
      font-weight: normal;
      margin: 0;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.15);
      letter-spacing: 1px;
    }
    #splash .meta {
      position: absolute;
      bottom: 40px;
      color: rgba(255, 255, 255, 0.9);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 0.9rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #splash .meta span {
      font-weight: 700;
      letter-spacing: 1.5px;
      margin-top: 6px;
      font-size: 1.1rem;
    }
  </style>
</head>

<body>
  <div id="splash">
    <h1>Prep Insta</h1>
    <div class="meta">
      <small style="opacity: 0.8; font-size: 0.85rem;">from</small>
      <span>PREP INSTA</span>
    </div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash');
        if (splash) {
          splash.style.opacity = '0';
          splash.style.visibility = 'hidden';
          setTimeout(() => splash.remove(), 500);
        }
      }, 1500);
    });
  </script>
</body>

</html>
